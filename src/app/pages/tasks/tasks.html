<div class="tasks-container">
    <header class="tasks-header">
        <h1>Minhas Tarefas</h1>
        <button class="logout-btn" (click)="logout()">Sair</button>
    </header>

    <div class="new-task">
        <input type="text" [(ngModel)]="newTaskTitle" placeholder="Título da tarefa" />
        <input type="text" [(ngModel)]="newTaskDescription" placeholder="Descrição (opcional)" />
        <button (click)="createTask()">Adicionar</button>
    </div>

    <div class="task-list">
        @for (task of tasks; track task.id) {
        <div class="task-item">
            <div class="task-info">
                <span class="task-title">{{ task.title }}</span>
                <span class="task-desc">{{ task.description }}</span>
            </div>
            <span class="task-status status-{{ task.status }}">{{ task.status }}</span>
            <button class="delete-btn" (click)="deleteTask(task.id)">🗑️</button>
        </div>
        } @empty {
        <p class="empty">Nenhuma tarefa ainda. Crie a primeira!</p>
        }
    </div>
</div>
